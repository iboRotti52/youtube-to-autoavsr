workspace: data
language: tr

download:
  format: "bestvideo[height<=720]+bestaudio/best[height<=720]"
  playlist_end: null
  subtitle_languages: ["tr", "tr-TR"]
  # Kapalı: manuel/otomatik YouTube altyazısı indirme; herkes Whisper kullansın.
  use_youtube_subtitles: false
  # use_youtube_subtitles true yapılırsa, bu ayar otomatik YouTube altyazısını
  # ayrıca kontrol eder. false iken manuel altyazı varsa onu kullanır.
  use_automatic_youtube_captions: false
  remote_components: ["ejs:github"]
  js_runtime: "deno"
  retries: 10
  fragment_retries: 10
  socket_timeout: 30

normalization:
  fps: 25
  audio_sample_rate: 16000
  max_height: 720
  ffmpeg_preset: ultrafast

transcription:
  # Transcript'ler eğitim etiketidir; doğruluk hızdan önemli. large-v3-turbo,
  # large-v3 doğruluğunun ~%95+'ini korur ama çok daha hızlıdır (medium'u hem
  # doğrulukta hem hızda geçer). Çok gürültülü/ağır aksanlı içerik için "large-v3".
  model: large-v3-turbo
  device: auto
  compute_type: auto
  beam_size: 5
  vad_filter: true
  min_silence_duration_ms: 500
  min_word_probability: 0.55
  min_segment_probability: 0.72
  max_no_speech_probability: 0.45
  use_whisper_when_no_manual_subtitles: true

segmentation:
  min_duration: 2.0
  max_duration: 16.0
  pad_seconds: 0.12
  # YouTube altyazılarından kelime zamanları sentetik çıkarılır; cue sonları
  # konuşmanın son kelimelerini biraz erken kesebildiği için bitişte daha geniş
  # pay bırak.
  subtitle_end_pad_seconds: 0.60
  max_gap_seconds: 0.65
  min_words: 2
  # Segmenti sahne kesmesinde böl (reddetme yerine). Kesmenin iki yanındaki
  # temiz parçalar min_duration'ı sağlıyorsa korunur.
  split_on_scene_cut: true
  scene_cut_threshold: 0.30

# Tek konuşmacılı (talking-head) videolar varsayılır; çoklu yüz / "hangi yüz
# konuşuyor" mantığı kapalıdır. Yüz seçimini Auto-AVSR cropper yapar.
active_speaker:
  enabled: false

auto_avsr:
  repo_dir: external/auto_avsr
  # Resmî Auto-AVSR ile birebir aynı: RetinaFace. Kurulum için: yt2avsr setup-retinaface
  detector: retinaface
  device: auto
  output_size: 96
  strict: true

visual_quality:
  enabled: true
  # Hız için her kare yerine örneklemeli analiz. 25 fps videoda 5 = saniyede
  # yaklaşık 5 kalite/lip-sync örneği; dış ses filtresi korunur, süre ciddi düşer.
  sample_every_n_frames: 5
  # Dış sesli kaynaklarda ilk saniyelerdeki sunucu selamı/konu anonsu çoğu zaman
  # ekrandaki ağızla eşleşmez. Sadece voiceover profilinde uygulanır; kapatmak
  # için 0 yap.
  reject_voiceover_segments_before_seconds: 15.0
  # Voiceover kaynaklarda "review" de eğitim için güvenli sayılmaz. İnceleme
  # yükünü azaltmak için şüpheli klipleri direkt sil.
  reject_voiceover_review_segments: true

  # Conservative thresholds: uncertain clips go to review instead of deletion.
  accept_min_mouth_visible_ratio: 0.88
  review_min_mouth_visible_ratio: 0.68

  accept_max_scene_cut_ratio: 0.015
  review_max_scene_cut_ratio: 0.050

  # Audio-active frames with almost no mouth motion.
  accept_max_static_speech_ratio: 0.18
  review_max_static_speech_ratio: 0.42
  # Dış ses/üst üste konuşma için daha sert AV-sync kapısı. Voiceover profilinde
  # ses enerjisi ağız şekli hareketiyle yeterince birlikte gitmiyorsa klip silinir.
  accept_min_speech_mouth_motion_ratio: 0.38
  review_min_speech_mouth_motion_ratio: 0.22
  accept_min_lip_sync_correlation: 0.05
  review_min_lip_sync_correlation: 0.0

  # Longest continuous missing-mouth period.
  accept_max_missing_run_seconds: 0.35
  review_max_missing_run_seconds: 1.00

  # Geometry jumps can indicate cup/hand occlusion or failed landmarks.
  accept_max_unstable_landmark_ratio: 0.12
  review_max_unstable_landmark_ratio: 0.35

  scene_cut_hist_threshold: 0.58
  mouth_motion_floor: 0.018
  mouth_shape_motion_floor: 0.0035
  mouth_opening_motion_floor: 0.0025
  audio_activity_quantile: 0.55
  landmark_jump_threshold: 0.18
  min_face_detection_confidence: 0.50
  min_tracking_confidence: 0.50

quality:
  min_asr_confidence: 0.72
  min_active_speaker_score: 0.18
  min_face_coverage: 0.80
  min_sharpness: 18.0

cloud:
  # Ortak (private) Hugging Face dataset repo'su. Herkes AYNI değeri kullanmalı.
  repo_id: "iboRotti/avsr-tr-dataset"
  private: true
